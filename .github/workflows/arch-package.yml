name: Linux packages

on:
  push:
    branches: [main, linux-support]
    paths:
      - 'crates/**'
      - 'apps/**'
      - 'scripts/installer/**'
      - '.github/workflows/arch-package.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-binaries:
    name: Build Linux binaries
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libayatana-appindicator3-dev

      - name: Install frontend dependencies
        working-directory: apps/codex-plus-manager
        run: npm install --package-lock=false

      - name: Build frontend
        working-directory: apps/codex-plus-manager
        run: npm run vite:build

      - name: Build release binaries
        run: cargo build --release --workspace

      - name: Verify Linux binary ABI baseline
        run: |
          scripts/installer/debian/verify-amd64-elf.sh --max-glibc GLIBC_2.35 \
            target/release/codex-plus-plus \
            target/release/codex-plus-plus-manager

      - name: Upload Linux binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-binaries
          path: |
            target/release/codex-plus-plus
            target/release/codex-plus-plus-manager
          if-no-files-found: error

  arch-package:
    name: Build Arch package (.pkg.tar.zst)
    runs-on: ubuntu-latest
    needs: build-binaries
    container:
      image: archlinux:base-devel
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: pkg-bin

      - name: Build Arch package
        run: |
          set -euo pipefail
          pacman -Sy --noconfirm --needed sudo git

          # makepkg refuses to run as root; build as an unprivileged user.
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder

          version="$(sed -n 's/^version = "\(.*\)"/\1/p' Cargo.toml | head -1)"
          test -n "$version"

          stage=/home/builder/pkg
          mkdir -p "$stage"
          cp pkg-bin/codex-plus-plus pkg-bin/codex-plus-plus-manager "$stage/"
          cp scripts/installer/arch/codex-plus-plus.desktop "$stage/"
          cp scripts/installer/arch/codex-plus-plus-manager.desktop "$stage/"
          cp apps/codex-plus-manager/src-tauri/icons/icon.png "$stage/codexplusplus.png"
          cp scripts/installer/arch/PKGBUILD "$stage/"
          sed -i "s/^pkgver=.*/pkgver=$version/" "$stage/PKGBUILD"
          chmod +x "$stage"/codex-plus-plus "$stage"/codex-plus-plus-manager
          chown -R builder:builder "$stage"

          cd "$stage"
          sudo -u builder makepkg --force --noconfirm --syncdeps

          mkdir -p "$GITHUB_WORKSPACE/dist/arch"
          cp codexplusplus-*.pkg.tar.zst "$GITHUB_WORKSPACE/dist/arch/"

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: codexplusplus-arch-package
          path: dist/arch/*.pkg.tar.zst
          if-no-files-found: error

      - name: Attach package to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/arch/*.pkg.tar.zst

  deb-package:
    name: Build Debian package (.deb)
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Linux binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-binaries
          path: pkg-bin

      - name: Build Debian package
        run: |
          scripts/installer/debian/verify-amd64-elf.sh \
            pkg-bin/codex-plus-plus \
            pkg-bin/codex-plus-plus-manager
          scripts/installer/debian/build-package.sh --binaries-dir pkg-bin dist/debian

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: codexplusplus-deb-package
          path: dist/debian/*.deb
          if-no-files-found: error

      - name: Attach package to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/debian/*.deb
